<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#111827"/>

  <!-- DNA strand 1: emerald sine wave (top-left to bottom-right) -->
  <path
    d="M8 4 C10 7, 14 7, 16 10 C18 13, 22 13, 24 16 C22 19, 18 19, 16 22 C14 25, 10 25, 8 28"
    fill="none"
    stroke="#10b981"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- DNA strand 2: cyan sine wave (top-right to bottom-left) -->
  <path
    d="M24 4 C22 7, 18 7, 16 10 C14 13, 10 13, 8 16 C10 19, 14 19, 16 22 C18 25, 22 25, 24 28"
    fill="none"
    stroke="#06b6d4"
    stroke-width="2.2"
    stroke-linecap="round"
  />

  <!-- Crossover nodes at intersection points -->
  <circle cx="16" cy="10" r="2" fill="#111827" stroke="#10b981" stroke-width="1.2"/>
  <circle cx="16" cy="16" r="2.2" fill="#111827" stroke="#06b6d4" stroke-width="1.4"/>
  <circle cx="16" cy="22" r="2" fill="#111827" stroke="#10b981" stroke-width="1.2"/>
</svg>

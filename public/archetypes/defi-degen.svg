<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-degen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter-degen">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg-degen)"/>

  <!-- Glow aura -->
  <ellipse cx="100" cy="95" rx="65" ry="65" fill="url(#glow-orange)"/>

  <!-- Hexagon grid (protocol symbols) -->
  <g opacity="0.35" stroke="#f97316" stroke-width="1" fill="none">
    <!-- top-left hex -->
    <polygon points="30,38 42,31 54,38 54,52 42,59 30,52"/>
    <!-- top-right hex -->
    <polygon points="146,38 158,31 170,38 170,52 158,59 146,52"/>
    <!-- bottom-left hex -->
    <polygon points="30,148 42,141 54,148 54,162 42,169 30,162"/>
    <!-- bottom-right hex -->
    <polygon points="146,148 158,141 170,148 170,162 158,169 146,162"/>
  </g>

  <!-- Chart bars (going up) -->
  <g filter="url(#glow-filter-degen)">
    <rect x="42" y="120" width="14" height="28" rx="2" fill="#f97316" opacity="0.7"/>
    <rect x="62" y="105" width="14" height="43" rx="2" fill="#f97316" opacity="0.8"/>
    <rect x="82" y="88"  width="14" height="60" rx="2" fill="#ef4444" opacity="0.9"/>
    <rect x="102" y="70" width="14" height="78" rx="2" fill="#ef4444"/>
    <rect x="122" y="52" width="14" height="96" rx="2" fill="#f97316"/>
    <!-- Arrow up on last bar -->
    <polygon points="129,44 135,55 123,55" fill="#fbbf24"/>
  </g>

  <!-- Flame icon (center-top) -->
  <g filter="url(#glow-filter-degen)" transform="translate(100,28)">
    <!-- outer flame -->
    <path d="M0,-18 C10,-10 14,0 8,10 C12,4 12,12 6,16 C8,10 4,14 0,18 C-4,14 -8,10 -6,16 C-12,12 -12,4 -8,10 C-14,0 -10,-10 0,-18Z" fill="#f97316"/>
    <!-- inner flame -->
    <path d="M0,-8 C4,-2 6,4 2,10 C4,6 2,12 0,14 C-2,12 -4,6 -2,10 C-6,4 -4,-2 0,-8Z" fill="#fbbf24"/>
  </g>

  <!-- Archetype name -->
  <text x="100" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f97316" letter-spacing="1">DeFi Degen</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-whale" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="ocean-glow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="whale-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ocean-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow-filter-whale">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg-whale)"/>

  <!-- Ocean glow -->
  <ellipse cx="100" cy="130" rx="90" ry="50" fill="url(#ocean-glow)"/>

  <!-- Ocean waves (bottom) -->
  <path d="M0,140 Q25,130 50,140 Q75,150 100,140 Q125,130 150,140 Q175,150 200,140 L200,200 L0,200Z" fill="url(#ocean-grad)"/>
  <path d="M0,150 Q30,143 60,150 Q90,157 120,150 Q150,143 180,150 Q190,153 200,150 L200,200 L0,200Z" fill="#0f172a" opacity="0.7"/>

  <!-- Stars -->
  <g fill="#e0e7ff" opacity="0.5">
    <circle cx="30" cy="30" r="1.5"/>
    <circle cx="55" cy="20" r="1"/>
    <circle cx="80" cy="35" r="1"/>
    <circle cx="130" cy="18" r="1.5"/>
    <circle cx="165" cy="28" r="1"/>
    <circle cx="175" cy="45" r="1.5"/>
    <circle cx="20" cy="55" r="1"/>
    <circle cx="45" cy="65" r="0.8"/>
    <circle cx="170" cy="65" r="1"/>
  </g>

  <!-- Whale body -->
  <g filter="url(#glow-filter-whale)">
    <!-- Main body -->
    <path d="M30,115 C30,85 55,72 90,72 C125,72 155,80 165,95 C175,105 170,118 155,122 C140,126 50,130 30,115Z" fill="url(#whale-grad)"/>

    <!-- Belly highlight -->
    <path d="M50,115 C55,108 80,105 110,108 C135,110 150,116 148,120 C120,124 60,124 50,115Z" fill="#60a5fa" opacity="0.4"/>

    <!-- Tail fin -->
    <path d="M28,112 C20,102 14,95 20,88 C24,85 30,90 32,98 L30,115Z" fill="#1d4ed8"/>
    <path d="M28,115 C20,122 14,130 20,136 C24,140 30,135 32,125 L30,115Z" fill="#1d4ed8"/>

    <!-- Dorsal fin -->
    <path d="M100,72 C105,58 115,50 120,55 C118,65 112,72 105,73Z" fill="#2563eb"/>

    <!-- Pectoral fin -->
    <path d="M75,105 C70,112 65,122 72,128 C80,120 82,110 80,105Z" fill="#2563eb"/>

    <!-- Eye -->
    <circle cx="148" cy="92" r="6" fill="#0f172a"/>
    <circle cx="148" cy="92" r="4" fill="#1d4ed8"/>
    <circle cx="149" cy="91" r="1.5" fill="#bfdbfe"/>

    <!-- Mouth curve -->
    <path d="M160,102 C162,106 158,110 154,109" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- MNT coin floating above whale -->
  <g filter="url(#glow-filter-whale)" transform="translate(155, 55)">
    <circle cx="0" cy="0" r="16" fill="#1e40af" stroke="#4f46e5" stroke-width="2"/>
    <circle cx="0" cy="0" r="11" fill="#1d4ed8"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#bfdbfe">MNT</text>
  </g>

  <!-- Small coin trail -->
  <g fill="#4f46e5" opacity="0.6">
    <circle cx="135" cy="48" r="5" stroke="#818cf8" stroke-width="1"/>
    <circle cx="120" cy="42" r="3.5" stroke="#818cf8" stroke-width="0.8"/>
    <circle cx="108" cy="38" r="2.5" stroke="#818cf8" stroke-width="0.8"/>
  </g>

  <!-- Water spout -->
  <g opacity="0.5" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round">
    <path d="M120,72 C118,60 116,48 120,38"/>
    <path d="M125,70 C125,60 124,50 128,40"/>
    <path d="M130,71 C131,62 132,52 136,43"/>
  </g>

  <!-- Archetype name -->
  <text x="100" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3b82f6" letter-spacing="1">Whale</text>
</svg>

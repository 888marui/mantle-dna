<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-trader" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1500"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="glow-yellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter-trader">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg-trader)"/>

  <!-- Glow aura -->
  <ellipse cx="100" cy="95" rx="70" ry="70" fill="url(#glow-yellow)"/>

  <!-- Grid lines (chart background) -->
  <g stroke="#292524" stroke-width="0.8" opacity="0.6">
    <!-- Horizontal -->
    <line x1="30" y1="55" x2="170" y2="55"/>
    <line x1="30" y1="78" x2="170" y2="78"/>
    <line x1="30" y1="101" x2="170" y2="101"/>
    <line x1="30" y1="124" x2="170" y2="124"/>
    <line x1="30" y1="147" x2="170" y2="147"/>
    <!-- Vertical -->
    <line x1="50" y1="40" x2="50" y2="155"/>
    <line x1="80" y1="40" x2="80" y2="155"/>
    <line x1="110" y1="40" x2="110" y2="155"/>
    <line x1="140" y1="40" x2="140" y2="155"/>
    <line x1="170" y1="40" x2="170" y2="155"/>
  </g>

  <!-- Candlestick bars -->
  <g filter="url(#glow-filter-trader)">
    <!-- Candle 1 — bullish (green) -->
    <line x1="50" y1="125" x2="50" y2="100" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="44" y="108" width="12" height="14" rx="1" fill="#22c55e"/>

    <!-- Candle 2 — bearish (red) -->
    <line x1="80" y1="110" x2="80" y2="90" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="74" y="96" width="12" height="11" rx="1" fill="#ef4444"/>

    <!-- Candle 3 — bullish (green) -->
    <line x1="110" y1="104" x2="110" y2="72" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="104" y="80" width="12" height="18" rx="1" fill="#22c55e"/>

    <!-- Candle 4 — bearish (red) -->
    <line x1="140" y1="92" x2="140" y2="62" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="134" y="70" width="12" height="16" rx="1" fill="#ef4444"/>

    <!-- Candle 5 — bullish big (yellow) -->
    <line x1="170" y1="85" x2="170" y2="45" stroke="#eab308" stroke-width="1.5"/>
    <rect x="164" y="52" width="12" height="22" rx="1" fill="#eab308"/>
  </g>

  <!-- Trend line -->
  <polyline points="50,122 80,106 110,95 140,80 170,58" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" opacity="0.7" filter="url(#glow-filter-trader)"/>

  <!-- Upward arrow (big) -->
  <g filter="url(#glow-filter-trader)" transform="translate(100,30)">
    <polygon points="0,-18 10,0 4,0 4,18 -4,18 -4,0 -10,0" fill="#eab308"/>
  </g>

  <!-- Price labels (tiny) -->
  <g fill="#a16207" font-family="monospace" font-size="7" opacity="0.7">
    <text x="22" y="57">HI</text>
    <text x="22" y="103">--</text>
    <text x="22" y="149">LO</text>
  </g>

  <!-- Archetype name -->
  <text x="100" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#eab308" letter-spacing="1">Trader</text>
</svg>

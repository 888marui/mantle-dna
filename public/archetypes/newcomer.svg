<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-newc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="glow-emerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="soil-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <filter id="glow-filter-newc">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg-newc)"/>

  <!-- Glow aura -->
  <ellipse cx="100" cy="100" rx="70" ry="70" fill="url(#glow-emerald)"/>

  <!-- Soil mound -->
  <ellipse cx="100" cy="148" rx="55" ry="14" fill="url(#soil-grad)" stroke="#44403c" stroke-width="1"/>

  <!-- Stalk -->
  <g filter="url(#glow-filter-newc)">
    <line x1="100" y1="145" x2="100" y2="88" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Left small leaf -->
    <path d="M100,118 C90,110 78,112 76,120 C84,120 93,122 100,118Z" fill="#34d399" opacity="0.9"/>

    <!-- Right small leaf -->
    <path d="M100,106 C110,98 122,100 124,108 C116,108 107,110 100,106Z" fill="#34d399" opacity="0.9"/>

    <!-- Sprouting tip — two tiny leaves opening -->
    <path d="M100,88 C94,80 88,72 90,64 C96,70 100,80 100,88Z" fill="#6ee7b7"/>
    <path d="M100,88 C106,80 112,72 110,64 C104,70 100,80 100,88Z" fill="#6ee7b7"/>

    <!-- Bud center -->
    <circle cx="100" cy="64" r="5" fill="#a7f3d0" opacity="0.9"/>
  </g>

  <!-- Water droplets -->
  <g filter="url(#glow-filter-newc)" fill="#14b8a6" opacity="0.7">
    <path d="M58,72 C58,66 52,60 52,60 C52,60 46,66 46,72 C46,76 49,79 52,79 C55,79 58,76 58,72Z"/>
    <path d="M152,90 C152,85 147,80 147,80 C147,80 142,85 142,90 C142,94 144,96 147,96 C150,96 152,94 152,90Z"/>
    <path d="M40,105 C40,101 36,97 36,97 C36,97 32,101 32,105 C32,108 34,110 36,110 C38,110 40,108 40,105Z"/>
  </g>

  <!-- Sun rays (top-right) -->
  <g fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <circle cx="162" cy="42" r="10" fill="#fef08a" stroke="none" opacity="0.4"/>
    <line x1="162" y1="24" x2="162" y2="20"/>
    <line x1="176" y1="28" x2="179" y2="25"/>
    <line x1="180" y1="42" x2="184" y2="42"/>
    <line x1="176" y1="56" x2="179" y2="59"/>
    <line x1="148" y1="28" x2="145" y2="25"/>
    <line x1="144" y1="42" x2="140" y2="42"/>
  </g>

  <!-- Soil texture dots -->
  <g fill="#57534e" opacity="0.5">
    <circle cx="72" cy="148" r="2"/>
    <circle cx="85" cy="153" r="1.5"/>
    <circle cx="115" cy="152" r="2"/>
    <circle cx="128" cy="147" r="1.5"/>
    <circle cx="100" cy="156" r="1.5"/>
  </g>

  <!-- Archetype name -->
  <text x="100" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#10b981" letter-spacing="1">Newcomer</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-yield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stalk-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <filter id="glow-filter-yield">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg-yield)"/>

  <!-- Ground -->
  <ellipse cx="100" cy="155" rx="70" ry="10" fill="#14532d" opacity="0.6"/>

  <!-- Glow aura -->
  <ellipse cx="100" cy="95" rx="68" ry="68" fill="url(#glow-green)"/>

  <!-- Main wheat stalk -->
  <g filter="url(#glow-filter-yield)">
    <line x1="100" y1="155" x2="100" y2="38" stroke="url(#stalk-grad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Left wheat spikes -->
    <line x1="100" y1="70" x2="78" y2="52" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="85" x2="74" y2="72" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="76" y2="90" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right wheat spikes -->
    <line x1="100" y1="70" x2="122" y2="52" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="85" x2="126" y2="72" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="124" y2="90" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Grain tips left -->
    <ellipse cx="73" cy="49" rx="6" ry="10" fill="#84cc16" transform="rotate(-30 73 49)"/>
    <ellipse cx="68" cy="68" rx="6" ry="10" fill="#84cc16" transform="rotate(-15 68 68)"/>
    <ellipse cx="70" cy="87" rx="6" ry="10" fill="#84cc16" transform="rotate(-8 70 87)"/>

    <!-- Grain tips right -->
    <ellipse cx="127" cy="49" rx="6" ry="10" fill="#84cc16" transform="rotate(30 127 49)"/>
    <ellipse cx="132" cy="68" rx="6" ry="10" fill="#84cc16" transform="rotate(15 132 68)"/>
    <ellipse cx="130" cy="87" rx="6" ry="10" fill="#84cc16" transform="rotate(8 130 87)"/>

    <!-- Top grain head -->
    <ellipse cx="100" cy="34" rx="7" ry="12" fill="#a3e635"/>
  </g>

  <!-- Coin left -->
  <g filter="url(#glow-filter-yield)" transform="translate(44, 120)">
    <ellipse cx="0" cy="0" rx="18" ry="18" fill="#166534" stroke="#22c55e" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="13" ry="13" fill="#14532d"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#22c55e">$</text>
  </g>

  <!-- Coin right -->
  <g filter="url(#glow-filter-yield)" transform="translate(156, 120)">
    <ellipse cx="0" cy="0" rx="18" ry="18" fill="#166534" stroke="#84cc16" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="13" ry="13" fill="#14532d"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#84cc16">%</text>
  </g>

  <!-- Small second stalk left -->
  <g opacity="0.5">
    <line x1="65" y1="155" x2="65" y2="105" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="65" cy="100" rx="5" ry="8" fill="#4ade80" transform="rotate(10 65 100)"/>
  </g>

  <!-- Small second stalk right -->
  <g opacity="0.5">
    <line x1="135" y1="155" x2="135" y2="105" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="135" cy="100" rx="5" ry="8" fill="#4ade80" transform="rotate(-10 135 100)"/>
  </g>

  <!-- Archetype name -->
  <text x="100" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#22c55e" letter-spacing="1">Yield Farmer</text>
</svg>

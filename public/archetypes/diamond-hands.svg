<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-diamond" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a2c"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="diamond-grad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="40%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>
    <filter id="glow-filter-diamond">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="url(#bg-diamond)"/>

  <!-- Glow aura -->
  <ellipse cx="100" cy="95" rx="70" ry="70" fill="url(#glow-cyan)"/>

  <!-- Diamond shape -->
  <g filter="url(#glow-filter-diamond)">
    <!-- top facets -->
    <polygon points="100,32 72,70 100,60" fill="#bae6fd"/>
    <polygon points="100,32 128,70 100,60" fill="#7dd3fc"/>
    <polygon points="72,70 100,60 128,70" fill="#38bdf8"/>
    <!-- left facet -->
    <polygon points="44,70 72,70 100,130" fill="#0ea5e9" opacity="0.9"/>
    <!-- right facet -->
    <polygon points="156,70 128,70 100,130" fill="#0284c7" opacity="0.9"/>
    <!-- bottom facets -->
    <polygon points="44,70 100,130 72,70" fill="#0369a1"/>
    <polygon points="156,70 100,130 128,70" fill="#075985"/>
    <!-- Outline -->
    <polygon points="100,32 44,70 100,130 156,70" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.8"/>
    <!-- inner line detail -->
    <line x1="72" y1="70" x2="128" y2="70" stroke="#e0f2fe" stroke-width="0.8" opacity="0.6"/>
    <line x1="44" y1="70" x2="156" y2="70" stroke="#e0f2fe" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Sparkles -->
  <g filter="url(#glow-filter-diamond)" fill="#e0f7ff">
    <!-- sparkle top-left -->
    <path d="M38,42 L40,36 L42,42 L48,44 L42,46 L40,52 L38,46 L32,44 Z" opacity="0.9"/>
    <!-- sparkle top-right -->
    <path d="M155,30 L157,24 L159,30 L165,32 L159,34 L157,40 L155,34 L149,32 Z" opacity="0.85"/>
    <!-- sparkle bottom-right -->
    <path d="M162,140 L163,136 L164,140 L168,141 L164,142 L163,146 L162,142 L158,141 Z" opacity="0.7"/>
    <!-- sparkle left -->
    <path d="M28,115 L29,111 L30,115 L34,116 L30,117 L29,121 L28,117 L24,116 Z" opacity="0.6"/>
  </g>

  <!-- Archetype name -->
  <text x="100" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#06b6d4" letter-spacing="1">Diamond Hands</text>
</svg>
